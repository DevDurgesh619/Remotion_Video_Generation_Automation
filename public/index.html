<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape Motion Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .header .badge {
      background: #238636;
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── Prompt Input ─── */
    .prompt-section {
      margin-bottom: 32px;
    }

    .prompt-section label {
      display: block;
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .prompt-row {
      display: flex;
      gap: 12px;
    }

    .prompt-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 16px;
      color: #f0f6fc;
      outline: none;
      transition: border-color 0.2s;
    }

    .prompt-input:focus {
      border-color: #58a6ff;
    }

    .prompt-input::placeholder {
      color: #484f58;
    }

    .generate-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .generate-btn:hover { background: #2ea043; }
    .generate-btn:disabled {
      background: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }

    /* ─── Quick Prompts ─── */
    .quick-prompts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .quick-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 12px;
      color: #8b949e;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #30363d;
      color: #c9d1d9;
      border-color: #484f58;
    }

    /* ─── Status ─── */
    .status-bar {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: none;
    }

    .status-bar.visible { display: block; }

    .status-steps {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .status-step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #484f58;
    }

    .status-step.active { color: #58a6ff; }
    .status-step.done { color: #3fb950; }
    .status-step.error { color: #f85149; }

    .status-step .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
    }

    .status-step.active .dot {
      background: #58a6ff;
      animation: pulse-dot 1s infinite;
    }

    .status-step.done .dot { background: #3fb950; }
    .status-step.error .dot { background: #f85149; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-connector {
      flex: 1;
      height: 1px;
      background: #30363d;
      max-width: 60px;
    }

    /* ─── Video Player ─── */
    .video-section {
      margin-bottom: 24px;
      display: none;
    }

    .video-section.visible { display: block; }

    .video-section h3 {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .video-container {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .video-container video {
      width: 100%;
      display: block;
    }

    .video-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .download-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      color: #c9d1d9;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .download-btn:hover {
      background: #30363d;
      border-color: #484f58;
    }

    /* ─── JSON Viewer ─── */
    .details-section {
      display: none;
    }

    .details-section.visible { display: block; }

    .collapsible {
      margin-bottom: 12px;
    }

    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #8b949e;
      transition: all 0.2s;
    }

    .collapsible-header:hover {
      background: #1c2128;
      color: #c9d1d9;
    }

    .collapsible-header .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .collapsible-header.open .arrow {
      transform: rotate(90deg);
    }

    .collapsible-body {
      display: none;
      background: #0d1117;
      border: 1px solid #30363d;
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 16px;
      overflow-x: auto;
    }

    .collapsible-body.open { display: block; }

    .collapsible-body pre {
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
    }

    .copy-btn:hover { color: #c9d1d9; border-color: #484f58; }

    /* ─── Error ─── */
    .error-box {
      background: #2d1114;
      border: 1px solid #f8514930;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }

    .error-box.visible { display: block; }

    .error-box p {
      color: #f85149;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Shape Motion Lab</h1>
    <span class="badge">AI Video Generator</span>
  </div>

  <div class="container">
    <!-- Prompt Input -->
    <div class="prompt-section">
      <label>Describe your animation</label>
      <div class="prompt-row">
        <input
          type="text"
          class="prompt-input"
          id="promptInput"
          placeholder="three circles bouncing, loading spinner, bar chart..."
          autocomplete="off"
        />
        <button class="generate-btn" id="generateBtn" onclick="handleGenerate()">
          Generate Video
        </button>
      </div>
      <div class="quick-prompts">
        <button class="quick-btn" onclick="setPrompt('three circles bouncing')">three circles bouncing</button>
        <button class="quick-btn" onclick="setPrompt('loading spinner')">loading spinner</button>
        <button class="quick-btn" onclick="setPrompt('bar chart showing sales')">bar chart showing sales</button>
        <button class="quick-btn" onclick="setPrompt('logo reveal animation')">logo reveal</button>
        <button class="quick-btn" onclick="setPrompt('spinning square')">spinning square</button>
        <button class="quick-btn" onclick="setPrompt('KPI dashboard')">KPI dashboard</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-steps">
        <div class="status-step" id="step1">
          <span class="dot"></span>
          <span>Expanding prompt</span>
        </div>
        <div class="status-connector"></div>
        <div class="status-step" id="step2">
          <span class="dot"></span>
          <span>Generating spec</span>
        </div>
        <div class="status-connector"></div>
        <div class="status-step" id="step3">
          <span class="dot"></span>
          <span>Rendering video</span>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox">
      <p id="errorText"></p>
    </div>

    <!-- Video Player -->
    <div class="video-section" id="videoSection">
      <h3>Generated Video</h3>
      <div class="video-container">
        <video id="videoPlayer" controls autoplay loop></video>
      </div>
      <div class="video-actions">
        <a class="download-btn" id="downloadBtn" download>Download MP4</a>
      </div>
    </div>

    <!-- Pipeline Details -->
    <div class="details-section" id="detailsSection">
      <div class="collapsible">
        <div class="collapsible-header" onclick="toggleCollapsible(this)">
          <span class="arrow">&#9654;</span>
          <span>Motion Brief</span>
          <button class="copy-btn" onclick="event.stopPropagation(); copyJson('briefJson')">Copy</button>
        </div>
        <div class="collapsible-body">
          <pre id="briefJson"></pre>
        </div>
      </div>

      <div class="collapsible">
        <div class="collapsible-header" onclick="toggleCollapsible(this)">
          <span class="arrow">&#9654;</span>
          <span>Motion Spec</span>
          <button class="copy-btn" onclick="event.stopPropagation(); copyJson('specJson')">Copy</button>
        </div>
        <div class="collapsible-body">
          <pre id="specJson"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    function setPrompt(text) {
      document.getElementById('promptInput').value = text;
      document.getElementById('promptInput').focus();
    }

    function setStep(step, state) {
      const el = document.getElementById('step' + step);
      el.className = 'status-step ' + state;
    }

    function resetUI() {
      document.getElementById('statusBar').className = 'status-bar visible';
      document.getElementById('errorBox').className = 'error-box';
      document.getElementById('videoSection').className = 'video-section';
      document.getElementById('detailsSection').className = 'details-section';
      setStep(1, '');
      setStep(2, '');
      setStep(3, '');
    }

    function toggleCollapsible(header) {
      header.classList.toggle('open');
      const body = header.nextElementSibling;
      body.classList.toggle('open');
    }

    function copyJson(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text);
    }

    // Allow Enter key to submit
    document.getElementById('promptInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleGenerate();
    });

    async function handleGenerate() {
      const prompt = document.getElementById('promptInput').value.trim();
      if (!prompt) return;

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      resetUI();
      setStep(1, 'active');

      try {
        const res = await fetch(API_BASE + '/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || 'Unknown error');
        }

        // Success
        setStep(1, 'done');
        setStep(2, 'done');
        setStep(3, 'done');

        // Show video
        const videoEl = document.getElementById('videoPlayer');
        videoEl.src = data.videoUrl;
        document.getElementById('downloadBtn').href = data.videoUrl;
        document.getElementById('videoSection').className = 'video-section visible';

        // Show JSON details
        document.getElementById('briefJson').textContent = JSON.stringify(data.brief, null, 2);
        document.getElementById('specJson').textContent = JSON.stringify(data.spec, null, 2);
        document.getElementById('detailsSection').className = 'details-section visible';

      } catch (err) {
        setStep(1, 'error');
        document.getElementById('errorBox').className = 'error-box visible';
        document.getElementById('errorText').textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Video';
      }
    }
  </script>
</body>
</html>
